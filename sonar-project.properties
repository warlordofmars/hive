# SonarCloud project configuration
# https://sonarcloud.io/project/overview?id=warlordofmars_hive

sonar.projectKey=warlordofmars_hive
sonar.organization=warlordofmars

# Sources and tests
sonar.sources=src/hive,ui/src
sonar.tests=tests,ui/src
sonar.test.inclusions=tests/**,ui/src/**/*.test.*,ui/src/**/*.test.jsx

# Exclude generated, vendor, and infra files from analysis
sonar.exclusions=**/__pycache__/**,**/*.pyc,infra/**,ui/node_modules/**,ui/dist/**,ui/coverage/**

# Python coverage (combined unit + integration — most comprehensive)
sonar.python.coverage.reportPaths=coverage-combined.xml
sonar.python.version=3.12

# JavaScript/JSX coverage
sonar.javascript.lcov.reportPaths=lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8

# Quality gate — fail CI when the gate is not green (new code only)
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Suppress PropTypes rule — not used in this project (no TypeScript)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.e1.resourceKey=**
