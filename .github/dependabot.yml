version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      python-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: "aws-cdk-lib"
        update-types: ["version-update:semver-major"]

  # npm dependencies (ui/)
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "daily"
    groups:
      npm-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns: ["*"]
