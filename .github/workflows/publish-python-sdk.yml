# Publish hive-client to PyPI on every tagged release.
name: Publish Python SDK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing

jobs:
  build-and-publish:
    name: Build and publish hive-client to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0  # needed for hatch-vcs version tagging

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"

      - name: Run tests
        working-directory: sdk/python
        run: uv run --no-sync pytest tests/ -v

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52b49f0a46e70d5fecbe3c7b1f51e6a6ed428 # v1.12.4
        with:
          packages-dir: sdk/python/dist/
