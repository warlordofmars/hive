name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  test:
    name: Full Test Suite
    uses: ./.github/workflows/ci.yml

  deploy:
    name: CDK Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install CDK Python deps
        run: uv sync --all-extras

      - name: Build React UI
        working-directory: ui
        run: |
          npm install
          npm run build

      - name: CDK Deploy
        working-directory: infra
        run: cdk deploy --require-approval never --outputs-file outputs.json

      - name: Export Lambda URLs
        id: urls
        working-directory: infra
        run: |
          MCP_URL=$(jq -r '.HiveStack.McpFunctionUrl' outputs.json)
          API_URL=$(jq -r '.HiveStack.ApiFunctionUrl' outputs.json)
          echo "mcp_url=$MCP_URL" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E Tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright
        run: uv run playwright install chromium --with-deps

      - name: Run auth + MCP e2e tests
        env:
          HIVE_API_URL: ${{ needs.deploy.outputs.api_url }}
          HIVE_MCP_URL: ${{ needs.deploy.outputs.mcp_url }}
          E2E_ACCESS_TOKEN: ${{ secrets.E2E_ACCESS_TOKEN }}
        run: uv run pytest tests/e2e/test_auth_e2e.py tests/e2e/test_mcp_e2e.py -v

      - name: Run UI e2e tests (Playwright)
        env:
          HIVE_UI_URL: ${{ secrets.HIVE_UI_URL }}
          E2E_ACCESS_TOKEN: ${{ secrets.E2E_ACCESS_TOKEN }}
        run: uv run pytest tests/e2e/test_ui_e2e.py -v
