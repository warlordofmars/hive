name: CI / Deploy

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimal default permissions — jobs that need more declare their own.
permissions:
  contents: read

# ── CI jobs (run on every push and PR) ────────────────────────────────────────

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src/hive

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Install Node dependencies
        working-directory: ui
        run: npm install

      - name: pip-audit
        run: uv run pip-audit --skip-editable

      - name: npm audit
        working-directory: ui
        run: npm audit --audit-level=high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit -v --cov=hive --cov-report=xml:coverage-unit.xml

      - name: Write coverage summary
        if: always()
        run: |
          echo "## Unit Test Coverage" >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  integration-tests:
    name: Integration Tests (DynamoDB Local)
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run combined unit + integration tests with coverage
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
          HIVE_JWT_SECRET: test-secret
          HIVE_TABLE_NAME: hive-integration
        run: uv run pytest tests/unit tests/integration -v --cov=hive --cov-report=xml:coverage-combined.xml --cov-fail-under=100

      - name: Write coverage summary
        if: always()
        run: |
          echo "## Combined Test Coverage" >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload combined coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage-combined.xml

  coverage:
    name: Coverage Report
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download combined coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-combined

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Parse unit coverage XML for the summary table
            const xml = fs.readFileSync('coverage-unit.xml', 'utf8');
            const lineRate = parseFloat(xml.match(/line-rate="([^"]+)"/)?.[1] ?? '0');
            const pct = (lineRate * 100).toFixed(1);
            const emoji = lineRate >= 0.9 ? '🟢' : lineRate >= 0.8 ? '🟡' : '🔴';

            // Build module rows from XML
            const rows = [];
            for (const m of xml.matchAll(/<package[^>]*name="([^"]*)"[^>]*line-rate="([^"]*)"[^>]*>/g)) {
              // skip — class-level detail is too verbose; use file-level below
            }
            const classMatches = [...xml.matchAll(/<class[^>]*filename="([^"]*)"[^>]*line-rate="([^"]*)"[^>]*>/g)];
            for (const m of classMatches) {
              const name = m[1].replace('src/', '');
              const rate = (parseFloat(m[2]) * 100).toFixed(0);
              const bar = rate >= 90 ? '🟢' : rate >= 80 ? '🟡' : '🔴';
              rows.push(`| \`${name}\` | ${rate}% | ${bar} |`);
            }

            const body = [
              `<!-- coverage-report -->`,
              `## ${emoji} Coverage Report — ${pct}%`,
              ``,
              `| File | Cover | |`,
              `|:---|---:|:---|`,
              ...rows,
              ``,
              `> Unit tests only · threshold 80% · [full run](${context.payload.pull_request.html_url}/checks)`,
            ].join('\n');

            // Find existing comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- coverage-report -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit.xml,coverage-combined.xml,ui/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install dependencies
        run: npm install

      - name: Run vitest with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Build
        run: npm run build

  infra-synth:
    name: Infra Synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --group dev --group infra

      - name: Synth prod stack
        working-directory: infra
        run: cdk synth HiveStack --no-staging -c env=prod

      - name: Synth dev stack
        working-directory: infra
        run: cdk synth HiveStack-dev --no-staging -c env=dev

# ── Deploy to dev (push to development) ───────────────────────────────────────

  deploy-dev:
    name: Deploy (dev)
    needs: [lint-typecheck, audit, unit-tests, integration-tests, coverage, frontend, infra-synth]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      id-token: write
      contents: read
    outputs:
      mcp_url: ${{ steps.urls.outputs.mcp_url }}
      api_url: ${{ steps.urls.outputs.api_url }}
      ui_url: ${{ steps.urls.outputs.ui_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --group dev --group infra

      - name: Build React UI
        working-directory: ui
        run: npm install && npm run build

      - name: Deploy dev stack
        run: uv run inv deploy --env dev

      - name: Export stack URLs
        id: urls
        run: |
          STACK=HiveStack-dev
          query() { aws cloudformation describe-stacks --stack-name $STACK --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          echo "mcp_url=$(query McpFunctionUrl)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(query ApiFunctionUrl)"  >> "$GITHUB_OUTPUT"
          echo "ui_url=$(query UiUrl)"            >> "$GITHUB_OUTPUT"

  e2e-dev:
    name: E2E Tests (dev)
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright
        run: uv run playwright install chromium --with-deps

      - name: Run auth + MCP e2e tests
        env:
          HIVE_API_URL: ${{ needs.deploy-dev.outputs.api_url }}
          HIVE_MCP_URL: ${{ needs.deploy-dev.outputs.mcp_url }}
        run: uv run pytest tests/e2e/test_auth_e2e.py tests/e2e/test_mcp_e2e.py -v

      - name: Run UI e2e tests (Playwright)
        env:
          HIVE_API_URL: ${{ needs.deploy-dev.outputs.api_url }}
          HIVE_UI_URL: ${{ needs.deploy-dev.outputs.ui_url }}
        run: uv run pytest tests/e2e/test_ui_e2e.py -v

# ── Release + deploy to prod (push to main) ───────────────────────────────────

  release:
    name: Release
    needs: [lint-typecheck, audit, unit-tests, integration-tests, coverage, frontend, infra-synth]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe to find the previous tag

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Infer version and create release
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(uv run inv version)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --generate-notes --title "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  deploy-prod:
    name: Deploy (prod)
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    outputs:
      mcp_url: ${{ steps.urls.outputs.mcp_url }}
      api_url: ${{ steps.urls.outputs.api_url }}
      ui_url: ${{ steps.urls.outputs.ui_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --group dev --group infra

      - name: Build React UI
        working-directory: ui
        run: npm install && npm run build

      - name: Deploy prod stack
        env:
          APP_VERSION: ${{ needs.release.outputs.version }}
        run: uv run inv deploy --env prod

      - name: Export stack URLs
        id: urls
        run: |
          STACK=HiveStack
          query() { aws cloudformation describe-stacks --stack-name $STACK --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          echo "mcp_url=$(query McpFunctionUrl)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(query ApiFunctionUrl)"  >> "$GITHUB_OUTPUT"
          echo "ui_url=$(query UiUrl)"            >> "$GITHUB_OUTPUT"

  e2e-prod:
    name: E2E Tests (prod)
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright
        run: uv run playwright install chromium --with-deps

      - name: Run auth + MCP e2e tests
        env:
          HIVE_API_URL: ${{ needs.deploy-prod.outputs.api_url }}
          HIVE_MCP_URL: ${{ needs.deploy-prod.outputs.mcp_url }}
        run: uv run pytest tests/e2e/test_auth_e2e.py tests/e2e/test_mcp_e2e.py -v

      - name: Run UI e2e tests (Playwright)
        env:
          HIVE_API_URL: ${{ needs.deploy-prod.outputs.api_url }}
          HIVE_UI_URL: ${{ needs.deploy-prod.outputs.ui_url }}
        run: uv run pytest tests/e2e/test_ui_e2e.py -v

  back-merge:
    name: Back-merge main → development
    needs: e2e-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Create back-merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run inv back-merge
