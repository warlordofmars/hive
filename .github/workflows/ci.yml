name: CI / Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  id-token: write   # required for OIDC (deploy job only)
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src/hive

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Install Node dependencies
        working-directory: ui
        run: npm install

      - name: pip-audit
        run: uv run pip-audit

      - name: npm audit
        working-directory: ui
        run: npm audit --audit-level=high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit -v --cov=hive --cov-report=xml

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml

  integration-tests:
    name: Integration Tests (DynamoDB Local)
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
          HIVE_JWT_SECRET: test-secret
        run: uv run pytest tests/integration -v

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install dependencies
        run: npm install

      - name: Run vitest
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

  deploy:
    name: CDK Deploy
    needs: [lint-typecheck, audit, unit-tests, integration-tests, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      mcp_url: ${{ steps.urls.outputs.mcp_url }}
      api_url: ${{ steps.urls.outputs.api_url }}
      ui_url: ${{ steps.urls.outputs.ui_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --group dev --group infra

      - name: Build React UI
        working-directory: ui
        run: |
          npm install
          npm run build

      - name: CDK Deploy
        working-directory: infra
        run: cdk deploy --require-approval never --outputs-file outputs.json

      - name: Export Lambda URLs
        id: urls
        working-directory: infra
        run: |
          echo "mcp_url=$(jq -r '.HiveStack.McpFunctionUrl' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(jq -r '.HiveStack.ApiFunctionUrl' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "ui_url=$(jq -r '.HiveStack.UiUrl' outputs.json)" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E Tests
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright
        run: uv run playwright install chromium --with-deps

      - name: Run auth + MCP e2e tests
        env:
          HIVE_API_URL: ${{ needs.deploy.outputs.api_url }}
          HIVE_MCP_URL: ${{ needs.deploy.outputs.mcp_url }}
        run: uv run pytest tests/e2e/test_auth_e2e.py tests/e2e/test_mcp_e2e.py -v

      - name: Run UI e2e tests (Playwright)
        env:
          HIVE_API_URL: ${{ needs.deploy.outputs.api_url }}
          HIVE_UI_URL: ${{ needs.deploy.outputs.ui_url }}
        run: uv run pytest tests/e2e/test_ui_e2e.py -v
